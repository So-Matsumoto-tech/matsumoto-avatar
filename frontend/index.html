<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>松本壮 AIアバター</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #16161a;
    --border: #2a2a30;
    --accent: #4a7fa5;
    --accent-dim: #2a4f6a;
    --text: #d8d8dc;
    --text-muted: #666672;
    --text-bright: #f0f0f4;
    --user-bubble: #1e2a38;
    --bot-bubble: #1a1a20;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── ヘッダー ── */
  header {
    width: 100%;
    max-width: 900px;
    padding: 24px 24px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  header h1 {
    font-size: 15px;
    font-weight: 400;
    letter-spacing: .12em;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── メインレイアウト ── */
  .main {
    width: 100%;
    max-width: 900px;
    padding: 24px;
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 20px;
    flex: 1;
  }

  /* ── アバターパネル ── */
  .avatar-panel {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .avatar-frame {
    position: relative;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    aspect-ratio: 3/4;
  }
  .avatar-frame video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .avatar-placeholder {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .avatar-initials {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 500;
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
  }
  .avatar-name {
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: .08em;
  }

  .status-bar {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-muted);
  }
  .status-indicator {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background .3s;
  }
  .status-indicator.speaking { background: #4aaa70; animation: pulse .8s ease-in-out infinite; }
  .status-indicator.thinking { background: var(--accent); animation: pulse 1s ease-in-out infinite; }

  .profile-mini {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.7;
  }
  .profile-mini strong {
    color: var(--text);
    font-weight: 500;
    display: block;
    margin-bottom: 4px;
    font-size: 13px;
  }

  /* ── チャットパネル ── */
  .chat-panel {
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 0;
  }

  .messages {
    flex: 1;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 400px;
    max-height: 500px;
  }

  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeIn .25s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  .message.user { align-items: flex-end; }
  .message.bot  { align-items: flex-start; }

  .msg-label {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-muted);
    letter-spacing: .08em;
  }

  .msg-bubble {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.75;
  }
  .message.user .msg-bubble {
    background: var(--user-bubble);
    border: 0.5px solid var(--accent-dim);
    color: var(--text);
    border-radius: 10px 2px 10px 10px;
  }
  .message.bot .msg-bubble {
    background: var(--bot-bubble);
    border: 0.5px solid var(--border);
    color: var(--text-bright);
    border-radius: 2px 10px 10px 10px;
  }

  .typing-dots {
    display: flex; gap: 4px; padding: 4px 2px;
  }
  .typing-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: dot .9s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes dot { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

  /* ── 入力エリア ── */
  .input-area {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    padding: 12px 14px;
    resize: none;
    outline: none;
    line-height: 1.6;
    min-height: 48px;
    max-height: 120px;
    transition: border-color .2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-muted); }

  button#send-btn {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: .06em;
    padding: 0 18px;
    height: 48px;
    transition: background .2s, transform .1s;
    white-space: nowrap;
  }
  button#send-btn:hover { background: #5a8fb5; }
  button#send-btn:active { transform: scale(.97); }
  button#send-btn:disabled { background: var(--accent-dim); cursor: not-allowed; }

  /* レスポンシブ */
  @media (max-width: 680px) {
    .main { grid-template-columns: 1fr; }
    .avatar-frame { aspect-ratio: 16/9; }
  }
</style>
</head>
<body>

<header>
  <div class="header-dot"></div>
  <h1>MATSUMOTO SO — AI AVATAR</h1>
</header>

<div class="main">

  <!-- アバターパネル -->
  <div class="avatar-panel">
    <div class="avatar-frame">
      <video id="avatar-video" autoplay playsinline style="display:none"></video>
      <img id="avatar-photo" src="/static/avatar.jpg" alt="松本 壮"
           style="width:100%;height:100%;object-fit:cover;display:block;">
    </div>

    <div class="status-bar">
      <div class="status-indicator" id="status-dot"></div>
      <span id="status-text">待機中</span>
    </div>

    <div class="profile-mini">
      <strong>松本 壮 / Matsumoto Sō</strong>
      デジタルデータ推進室<br>
      環境統制マネージャー<br>
      IT投資 · AIガバナンス
    </div>
  </div>

  <!-- チャットパネル -->
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="message bot">
        <div class="msg-label">MATSUMOTO SŌ</div>
        <div class="msg-bubble">
          松本壮です。デジタルデータ推進室で、IT投資の判断とAIドリブン経営に向けたガバナンスを担当しています。物事を考えるときは、常に「本来あるべき姿」から逆算することを軸にしています。ツールや手法よりも、まず課題の本質を問う——そういうスタンスで話します。気軽に声をかけてください。
        </div>
      </div>
    </div>

    <div class="input-area">
      <textarea
        id="input"
        placeholder="松本さんに話しかける..."
        rows="1"
        onkeydown="handleKey(event)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">送信</button>
    </div>
  </div>

</div>

<script>
const API_BASE = window.location.origin;
let isProcessing = false;

function setStatus(state) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-indicator';
  if (state === 'thinking') { dot.classList.add('thinking'); txt.textContent = '考え中...'; }
  else if (state === 'speaking') { dot.classList.add('speaking'); txt.textContent = '話し中'; }
  else { txt.textContent = '待機中'; }
}

function addMessage(role, text) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const label = role === 'user' ? 'YOU' : 'MATSUMOTO SŌ';
  div.innerHTML = `<div class="msg-label">${label}</div><div class="msg-bubble">${text}</div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

function addTyping() {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-label">MATSUMOTO SŌ</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function playAudio(b64, contentType) {
  return new Promise((resolve) => {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: contentType });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = () => { URL.revokeObjectURL(url); resolve(); };
    audio.onerror = resolve;
    audio.play().catch(resolve);
  });
}

function showAvatar(videoUrl) {
  const video = document.getElementById('avatar-video');
  const photo = document.getElementById('avatar-photo');
  video.src = videoUrl;
  video.style.display = 'block';
  photo.style.display = 'none';
}

function hideAvatar() {
  const video = document.getElementById('avatar-video');
  const photo = document.getElementById('avatar-photo');
  video.style.display = 'none';
  video.src = '';
  photo.style.display = 'block';
}

async function playVideo(videoUrl) {
  return new Promise((resolve) => {
    showAvatar(videoUrl);
    const video = document.getElementById('avatar-video');
    video.onended = () => { hideAvatar(); resolve(); };
    video.onerror = () => { hideAvatar(); resolve(); };
    video.play().catch(() => { hideAvatar(); resolve(); });
  });
}

async function sendMessage() {
  if (isProcessing) return;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  isProcessing = true;
  document.getElementById('send-btn').disabled = true;
  input.value = '';

  addMessage('user', text);
  addTyping();
  setStatus('thinking');

  try {
    const res = await fetch(`${API_BASE}/api/speak`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    if (!res.ok) throw new Error('API error');
    const data = await res.json();

    removeTyping();
    addMessage('bot', data.text);

    setStatus('speaking');
    if (data.video_url) {
      await playVideo(data.video_url);
    } else {
      await playAudio(data.audio_b64, data.content_type);
    }
    setStatus('idle');

  } catch (e) {
    removeTyping();
    addMessage('bot', '申し訳ありません。エラーが発生しました。');
    setStatus('idle');
  } finally {
    isProcessing = false;
    document.getElementById('send-btn').disabled = false;
  }
}

function handleKey(e) {
  // Enterキーでは送信しない（送信ボタンのみ）
}

const ta = document.getElementById('input');
ta.addEventListener('input', () => {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
